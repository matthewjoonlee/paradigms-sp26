<html>
<head>
    <title>Latest 5 questions posted</title>
</head>
<body>
{% if latest_questions %}
    <ul>
    {% for question in latest_questions %}
        <li>
            <a href="/polls/{{ question.id }}">
                {{ question.question_text }}
            </a>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>No questions posted</p>
{% endif %}
</body>
</html>
